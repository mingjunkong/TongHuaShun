- **研究对象**：宁德时代动力及储能电池产业链（公司视角）

- **地理边界**：中国为主、海外补充（欧洲与北美）
- **时间边界**：近3年（2023-2025）+ 未来2年情景推演（2026-2027）
- **统计口径**：以营收口径与出货量口径并行，价格指标使用区间估计。
- **任务类型**：跟踪更新

## 2. 执行摘要
1. **行业定性**：动力与储能电池处于“成长+制造内卷并行”阶段，需求扩张与价格下行共存。
2. **核心投资逻辑**：中游龙头通过规模、工艺、供应链协同维持相对高利润池；证据为中游 CR3/CR5 提升与头部企业毛利区间稳定在 18%-28%（2025Q4）。
3. **利润池位置**：微笑曲线两端中，上游资源在供给收缩阶段利润抬升，中游龙头在技术迭代和客户绑定下保持超额；中段普通制造环节利润被压缩。
4. **最大边际变化**：2026-2027 年变量是储能商业模型兑现速度与海外本地化产能爬坡效率。
5. **关键风险提示**：需求不及预期、海外政策不确定、技术替代（半固态/固态）节奏超预期、上游价格二次上行导致中游利润再压缩、终端价格战传导过快。

## 4. 上游深度拆解

### 4.1 行业结构与供需
结论：上游已从“极端短缺”转向“结构性平衡”，但高品质资源仍存在区域性紧张。证据：2025 年资源端价格中枢下移，部分高成本产能退出，库存周期由被动补库转向按需补库。日期口径：2025Q4。

从供给端看，锂资源新增供给在 2024-2025 年释放后，资本开支趋于理性；从需求端看，动力与储能仍维持正增长，但增速较前两年回落。由此带来的链条影响是：材料企业分化加剧，具备客户认证和一体化能力的企业维持利润率区间，纯规模扩张型企业利润收窄。

### 4.2 技术与壁垒
结论：上游核心壁垒已从单一资源禀赋，转向“资源+加工工艺+客户认证”三重壁垒。证据：高镍、快充、长寿命体系对材料一致性要求提升，推动优质材料供应商溢价。日期口径：2025Q4。

上游关键门槛包括：
1. 资金门槛：项目建设周期长，现金流波动敏感。
2. 工艺门槛：材料批次稳定性决定中游良率。
3. 认证门槛：进入龙头供应体系需要长周期验证。

## 5. 中游深度拆解

### 5.1 竞争格局与集中度
结论：中游已形成“头部主导+二线追赶”格局，CR3/CR5 维持高位，规模与良率是利润分层关键。证据：行业 CR3 约 55%-70%，CR5 约 70%-85%，头部企业在单Wh成本、快充技术和客户结构上优势明显。日期口径：2025Q4。

价格战仍在，但竞争维度从“单纯降价”转向“系统解决方案与全生命周期成本”。龙头通过结构化订单（动力+储能）、海外产能布局与供应链协同降低波动，二线企业若缺乏差异化路线，利润率更易受压。

### 5.2 市场空间与盈利模式
结论：中游 TAM 继续增长，但盈利模式从“量价齐升”切换为“以量补价+结构升级”。证据：动力板块受整车竞争传导，单Wh价格下降；储能板块出货弹性增强。日期口径：2025 年。

测算框架：
1. TAM：动力+储能总需求随渗透率与装机需求扩张。
2. SAM：龙头可覆盖领域受区域政策、客户认证和产能布局约束。
3. SOM：最终份额取决于技术路线、交付能力与价格策略。

## 6. 下游深度拆解

### 6.1 需求驱动与渗透率
结论：下游需求由“新能源车渗透+储能经济性改善”双驱动，储能成为中期弹性来源。证据：工商业储能项目在峰谷价差和政策支持下经济性改善，新能源车渗透持续提升。日期口径：2025 年。

需求驱动拆分：
1. 政策驱动：新型电力系统建设、辅助服务机制逐步完善。
2. 市场驱动：终端用户对总拥有成本（TCO）更敏感，推动高效率电池方案渗透。

### 6.2 客户结构与议价关系
结论：下游客户集中度提升，头部客户议价权增强，但优质供给在快充、寿命和安全性维度仍有溢价空间。证据：整车厂与系统集成商更关注全生命周期成本而非单点采购价。日期口径：2025Q4。

现金流层面，账期管理成为中游企业经营质量分水岭；绑定核心客户可提高订单稳定性，但需以研发投入与交付能力持续换取份额。

| Base | 需求温和增长，价格逐季趋稳 | 储能渗透持续，动力需求平稳 | 龙头中游维持利润韧性，上下游分化延续 | 优先配置龙头与高壁垒环节 |
| Bull | 储能超预期放量，技术升级带来溢价 | 海外项目顺利落地+新技术商业化 | 中游龙头与关键材料同步扩张利润池 | 增配具备技术路线优势企业 |

## 8. 风险、催化剂与跟踪指标

### 8.1 风险清单
1. 终端需求不及预期导致产能利用率下降。
2. 海外本地化政策变化引发投资回收期拉长。
3. 上游资源价格二次上行压缩中游利润率。
4. 技术路线替代节奏超预期，现有产线面临减值风险。
5. 客户集中度过高导致议价与回款压力上升。

### 8.2 催化剂清单
1. 储能项目收益模型改善带来装机超预期。
2. 新一代快充与高安全体系实现规模化交付。
3. 海外产能爬坡顺利，带动全球份额提升。

    <script>
        setTimeout(() => {
            const rawMd = document.getElementById('md-raw').value;
            const htmlContent = marked.parse(rawMd);
            document.getElementById('content').innerHTML = htmlContent;

            // 将 mermaid 代码块从 markdown 渲染结果中提取为可执行节点
            const contentDiv = document.getElementById('content');
            const mermaidBlocks = contentDiv.querySelectorAll('pre code.language-mermaid');
            mermaidBlocks.forEach((block) => {
                const pre = block.parentElement;
                const mermaidDiv = document.createElement('div');
                mermaidDiv.className = 'mermaid';
                mermaidDiv.textContent = block.textContent;
                pre.replaceWith(mermaidDiv);
            });

            // 在内容注入后执行 mermaid 渲染
            if (window.mermaid) {
                mermaid.initialize({ startOnLoad: false, theme: 'default', flowchart: { curve: 'linear' } });
                mermaid.run({ querySelector: '.mermaid' });
            }
            
            // 提取结构化精细目录
            const headers = contentDiv.querySelectorAll('h2, h3, h4');
            const tocList = document.getElementById('toc');
            
            const ensureChildList = (parentLi) => {
                for (const child of parentLi.children) {
                    if (child.tagName === 'UL') {
                        return child;
                    }
                }
                const childList = document.createElement('ul');
                childList.className = 'toc-children';
                parentLi.appendChild(childList);
                return childList;
            };

            let currentLevel2Li = null;
            let currentLevel3Li = null;

            headers.forEach((h, index) => {
                h.id = 'heading-' + index;
                const li = document.createElement('li');
                
                // 更分明的视觉层级
                if(h.tagName === 'H2') {
                    li.className = 'toc-level-2';
                } else if(h.tagName === 'H3') {
                    li.className = 'toc-level-3';
                } else if(h.tagName === 'H4') {
                    li.className = 'toc-level-4';
                }

                const a = document.createElement('a');
                a.href = '#' + h.id;
                a.textContent = h.textContent;
                li.appendChild(a);

                if (h.tagName === 'H2') {
                    tocList.appendChild(li);
                    currentLevel2Li = li;
                    currentLevel3Li = null;
                } else if (h.tagName === 'H3') {
                    if (currentLevel2Li) {
                        ensureChildList(currentLevel2Li).appendChild(li);
                    } else {
                        tocList.appendChild(li);
                    }
                    currentLevel3Li = li;
                } else if (h.tagName === 'H4') {
                    if (currentLevel3Li) {
                        ensureChildList(currentLevel3Li).appendChild(li);
                    } else if (currentLevel2Li) {
                        ensureChildList(currentLevel2Li).appendChild(li);
                    } else {
                        tocList.appendChild(li);
                    }
                }
            });
        }, 150);
    </script>
